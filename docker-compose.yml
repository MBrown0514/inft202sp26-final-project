services:
  postgres:
    image: postgres:16
    container_name: inft202-final-postgres
    environment:
      POSTGRES_DB: final
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - .:/project:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d final"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: inft202-final-adminer
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  app:
    profiles: ["app"]
    build: .
    container_name: inft202-final-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_NAME: final
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: 5432
    ports:
      - "5001:5000"

volumes:
  postgres_data:
